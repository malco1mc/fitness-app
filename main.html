    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
     <header class="header">
        <button class="header__button" id="btnNav" type="button">
            <i class="material-icons">menu</i>
        </button>
     </header>

     <nav class="nav">
        <div class="nav__links">
            <a href="#" class="nav__link">
                <i class="material-icons">dashboard</i>
                Dashboard
            </a>
            <a href="#" class="nav__link">

            </a>
            <a href="#" class="nav__link">
                <i class="material-icons">settings</i>
                Setting
            </a>
        </div>
        <div class="nav__overlay"></div>

        <div class="btnnav">
            <a href="#" class="btnnav__link">
                <i class="material-icons nav--icon">dashboard</i>
                <span class="btnnav__text">Dashboard</span>
            </a>
            <a href="#" class="btnnav__link">
                <i class="material-icons nav--icon">favorite</i>
                <span class="btnnav__text">Favorite</span>
            </a>
            <a href="#" class="btnnav__link">
                <i class="material-icons nav--icon">history</i>
                <span class="btnnav__text">History</span>
            </a>

        </div>
     </nav>

     <script>
        document.addEventListener("DOMContentLoaded", () => {
            const nav = document.querySelector(".nav");

            document.querySelector("#btnNav").addEventListener("click", () => {
                nav.classList.add("nav--open");
            });

            document.querySelector(".nav__overlay").addEventListener("click", () => {
                nav.classList.remove("nav--open");
            });
        });
     </script>
